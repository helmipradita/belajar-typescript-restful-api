services:
  # Redis Service Only
  redis:
    image: redis:7-alpine
    container_name: belajar-typescript-redis
    ports:
      - "6380:6379"  # Host 6380 → Container 6379 (avoid conflict with other projects)
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # Redis Insight (Redis GUI)
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: belajar-typescript-redis-insight
    ports:
      - "8001:8001"
    environment:
      - REDIS_CONN_STRING=redis://redis:6379  # Connect to Redis container
    volumes:
      - redis_insight:/db
    networks:
      - app-network
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  redis_insight:
    driver: local

networks:
  app-network:
    driver: bridge
