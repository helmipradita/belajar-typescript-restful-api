services:
  mysql:
    image: mysql:8.4
    container_name: typescript-restful-api-mysql
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: belajar_typescript_restful_api
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: --max_connections=200
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - monitoring

  rest-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: typescript-restful-api
    user: "1000:1000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://root:@mysql:3306/belajar_typescript_restful_api?connection_limit=30
      LOG_LEVEL: debug
      JWT_SECRET: rahasia-jwt-belajar-typescript-2024
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_SERVICE_NAME: typescript-restful-api
      OTEL_SDK_DISABLED: "false"
    volumes:
      - ./logs:/app/logs
    ports:
      - "3030:3000"
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus
    container_name: typescript-restful-api-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - monitoring

  grafana:
    image: grafana/grafana-oss:latest
    container_name: typescript-restful-api-grafana
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./config/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - monitoring

  loki:
    image: grafana/loki:3.3.2
    container_name: typescript-restful-api-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    user: "root"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - monitoring

  alloy:
    image: grafana/alloy:latest
    container_name: typescript-restful-api-alloy
    restart: unless-stopped
    privileged: true
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    environment:
      - ALLOY_OTLP_UPSTREAM=tempo:4317
    networks:
      - monitoring
    depends_on:
      - loki
      - tempo
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  tempo:
    image: grafana/tempo:2.7.1
    container_name: typescript-restful-api-tempo
    user: root
    command: "-target=all -config.file=/etc/tempo.yaml"
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
      - "4317"
      - "4318"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - monitoring

  k6-load-test:
    image: grafana/k6
    container_name: typescript-restful-api-k6-load-test
    profiles:
      - k6
    volumes:
      - ./config/k6:/scripts:ro
    command: run /scripts/load-test.js
    environment:
      - API_BASE_URL=http://rest-api:3000
    networks:
      - monitoring
    depends_on:
      - rest-api

  k6-error-test:
    image: grafana/k6
    container_name: typescript-restful-api-k6-error-test
    profiles:
      - k6
    volumes:
      - ./config/k6:/scripts:ro
    command: run /scripts/error-test.js
    environment:
      - API_BASE_URL=http://rest-api:3000
    networks:
      - monitoring
    depends_on:
      - rest-api

  k6-functional-test:
    image: grafana/k6
    container_name: typescript-restful-api-k6-functional-test
    profiles:
      - k6
    volumes:
      - ./config/k6:/scripts:ro
    command: run /scripts/functional-test.js
    environment:
      - API_BASE_URL=http://rest-api:3000
    networks:
      - monitoring
    depends_on:
      - rest-api

volumes:
  mysql-data:
    name: typescript-restful-api-mysql-data
  prometheus-data:
    name: prometheus-data
  grafana-data:
    name: grafana-data
  loki-data:
    name: loki-data
  tempo-data:
    name: tempo-data
networks:
  monitoring:
    name: monitoring
    driver: bridge
