global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'typescript-restful-api'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['rest-api:3000']

  - job_name: 'alloy'
    static_configs:
      - targets: ['alloy:12345']

  - job_name: 'tempo'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['tempo:3200']
